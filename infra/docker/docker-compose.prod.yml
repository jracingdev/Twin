# TWIN — produção VPS (use com .env de produção)
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: twin_landlord
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /var/lib/twin/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /var/lib/twin/redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - /var/lib/twin/minio:/data

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    depends_on:
      - mysql
      - redis

  horizon:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan horizon
    env_file: ../../.env
    depends_on:
      - api
      - redis

  ai-engine:
    build:
      context: ../../apps/ai-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    depends_on:
      - redis
      - mysql

  celery:
    build:
      context: ../../apps/ai-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info -c 2
    env_file: ../../.env
    depends_on:
      - ai-engine
      - redis

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${APP_URL}/api/v1
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
      - ai-engine
