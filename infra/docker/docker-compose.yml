services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: twin_landlord
      MYSQL_USER: twin
      MYSQL_PASSWORD: twin_secret
    ports:
      - "3306:3306"
    volumes:
      - twin_mysql:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: twin
      MINIO_ROOT_PASSWORD: twin_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - twin_minio:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:80"
    env_file:
      - ../../.env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      AI_ENGINE_URL: http://ai-engine:8000
      AWS_ENDPOINT: http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../../apps/api:/var/www/html

  # queue:work — Horizon não está no composer; evita Compose quebrado em prod
  queue-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: php artisan queue:work redis --queue=default,channel --sleep=1 --tries=3
    env_file:
      - ../../.env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - api
      - redis


  ai-engine:
    build:
      context: ../..
      dockerfile: apps/ai-engine/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - mysql

  celery:
    build:
      context: ../..
      dockerfile: apps/ai-engine/Dockerfile
    command: celery -A app.celery_app worker -l info
    env_file:
      - ../../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - ai-engine

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on:
      - api

volumes:
  twin_mysql:
  twin_minio:
