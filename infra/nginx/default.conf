upstream twin_api {
    server api:80;
}

upstream twin_web {
    server web:3000;
}

upstream twin_ai {
    server ai-engine:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 500M;

    location /api/ {
        proxy_pass http://twin_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /ai/ is proxied for Docker Compose convenience.
    # In production (aaPanel), prefer binding AI engine to 127.0.0.1 only and
    # do NOT expose /ai/ publicly — see infra/aapanel/nginx-ai-internal.conf.snippet.
    # If you must proxy /ai/, restrict by allow/deny or require X-Internal-Secret at edge.
    location /ai/ {
        # Optional harden: uncomment to allow only Docker network / localhost
        # allow 127.0.0.1;
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://twin_ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://twin_web;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
