            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
    put:
      tags: [Contacts]
      summary: Atualizar contato
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
      responses:
        '200':
