openapi: 3.1.0
info:
  title: TWIN Public API
  version: 1.0.0
  description: |
    API pública do TWIN — plataforma de gêmeos digitais conversacionais com RAG, importação de conversas e integração multicanal.

    ## Autenticação
    1. Obtenha um token com `POST /login` (e-mail, senha e código 2FA se habilitado).
    2. Envie `Authorization: Bearer {token}` em todas as rotas autenticadas.
    3. Rotas de tenant exigem também o header `X-Tenant: {organization_uuid}` (UUID da organização retornado no login ou em `GET /me`).

    Alternativa: chave de API via header `X-Api-Key` nas rotas de tenant
    (middleware `auth.api` — Sanctum Bearer **ou** API key). Sessão (`/me`, 2FA)
    permanece apenas Sanctum. Se a chave tiver `scopes`, rotas que declaram
    escopo exigem interseção; scopes vazios = acesso total da organização.

    ## Webhooks de canal (ingress)
    Canais como WhatsApp e Telegram recebem mensagens em URLs dedicadas geradas ao criar credenciais de canal (`webhook_url` na resposta). Essas rotas **não** fazem parte desta API de gestão — são endpoints de ingress configurados por plataforma.

    ## Documentação interativa
    - Índice JSON: `GET /docs`
    - Especificação: `GET /docs/openapi.yaml`
    - Swagger UI: `GET /docs/ui`

servers:
  - url: https://api.twin.app.br/api/v1
    description: Produção
  - url: http://localhost:8080/api/v1
    description: Desenvolvimento local

tags:
  - name: Auth
    description: Login, sessão, organizações e 2FA
  - name: Twins
    description: CRUD e recursos do gêmeo digital
  - name: Imports
    description: Importação de conversas (requer consentimento LGPD)
  - name: Consent
    description: Registro de consentimento LGPD
  - name: AI
    description: Sugestões RAG e simulação
  - name: Suggestions
    description: Inbox de sugestões e feedback
  - name: Channels
    description: Credenciais e métricas de canais
  - name: Billing
    description: Planos e assinatura Stripe
  - name: LGPD
    description: Exportação, retenção e exclusão de dados
  - name: Webhooks
    description: Webhooks de saída (eventos da organização)
  - name: Contacts
    description: Contatos
  - name: Conversations
    description: Conversas e mensagens
  - name: Train
    description: Treinamento e extração de DNA
  - name: Plan
    description: Resumo do plano atual
  - name: API Keys
    description: Chaves de API da organização
  - name: Timeline
    description: Linha do tempo de eventos
  - name: Playbooks
    description: Playbooks de vendas
  - name: Memory
    description: Entidades e relações de memória

security:
  - bearerAuth: []
  - apiKey: []

paths:
  /login:
    post:
      tags: [Auth]
      summary: Login
      description: Autentica com e-mail e senha. Retorna token Sanctum e organizações do usuário.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token emitido (ou 2FA necessário)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/TwoFactorRequired'
        '422':
          $ref: '#/components/responses/ValidationError'

  /register:
    post:
      tags: [Auth]
      summary: Cadastro
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          description: Cadastro público desativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar redefinição de senha
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Link enviado (se e-mail existir)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Senha redefinida
        '422':
          $ref: '#/components/responses/ValidationError'

  /logout:
    post:
      tags: [Auth]
      summary: Encerrar sessão
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me:
    get:
      tags: [Auth]
      summary: Perfil e organização atual
      description: Não exige X-Tenant; retorna a primeira organização ou a indicada no header.
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations:
    get:
      tags: [Auth]
      summary: Listar organizações do usuário
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations/switch:
    post:
      tags: [Auth]
      summary: Selecionar organização ativa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id]
              properties:
                organization_id:
                  type: string
                  format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: '#/components/schemas/Organization'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /two-factor/status:
    get:
      tags: [Auth]
      summary: Status do 2FA
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  confirmed_at:
                    type: string
                    format: date-time
                    nullable: true

  /two-factor/enable:
    post:
      tags: [Auth]
      summary: Iniciar ativação 2FA
      responses:
        '200':
          description: Secret e QR code

  /two-factor/confirm:
    post:
      tags: [Auth]
      summary: Confirmar 2FA
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: 2FA ativado
        '422':
          $ref: '#/components/responses/ValidationError'

  /two-factor:
    delete:
      tags: [Auth]
      summary: Desativar 2FA
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: 2FA desativado

  /twins:
    get:
      tags: [Twins]
      summary: Listar twins
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: search
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTwins'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          description: X-Tenant ausente ou inválido
    post:
      tags: [Twins]
      summary: Criar twin
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwinCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Twin'
        '403':
          $ref: '#/components/responses/ForbiddenPlan'
        '422':
          $ref: '#/components/responses/ValidationError'

  /twins/{twin}:
    parameters:
      - $ref: '#/components/parameters/XTenant'
      - $ref: '#/components/parameters/TwinId'
    get:
      tags: [Twins]
      summary: Obter twin
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwinDetail'
    put:
      tags: [Twins]
      summary: Atualizar twin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwinUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Twin'
        '403':
          $ref: '#/components/responses/ForbiddenPlan'
    delete:
      tags: [Twins]
      summary: Excluir twin
      responses:
        '204':
          description: Excluído

  /twins/{twin}/stats:
    get:
      tags: [Twins]
      summary: Estatísticas do twin
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwinStats'

  /twins/{twin}/dna/evolution:
    get:
      tags: [Twins]
      summary: Evolução do DNA
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          description: Histórico de versões de DNA

  /twins/{twin}/imports:
    get:
      tags: [Twins]
      summary: Importações do twin
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImportBatch'

  /twins/{twin}/purge:
    post:
      tags: [Twins]
      summary: Purge LGPD do twin
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          description: Exclusão enfileirada

  /twins/{twin}/train:
    post:
      tags: [Train]
      summary: Treinar twin com feedback aceito
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 100
                type:
                  type: string
                  enum: [incremental, reindex]
                  default: incremental
      responses:
        '202':
          description: Treinamento enfileirado
        '422':
          description: Sem sugestões aceitas

  /twins/{twin}/training-status:
    get:
      tags: [Train]
      summary: Status do último treinamento
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          description: Status do job

  /twins/{twin}/replay:
    post:
      tags: [AI]
      summary: Simular resposta (sem persistir sugestão)
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input_text]
              properties:
                input_text:
                  type: string
                  maxLength: 10000
                contact_id:
                  type: string
                  format: uuid
                intensity:
                  type: integer
                  minimum: 1
                  maximum: 4
                seller_mode:
                  type: boolean
                confidence_threshold:
                  type: number
                  minimum: 0
                  maximum: 1
      responses:
        '200':
          description: Simulação
        '403':
          $ref: '#/components/responses/ForbiddenPlan'

  /twins/{twin}/playbooks:
    get:
      tags: [Playbooks]
      summary: Listar playbooks
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Playbook'
    post:
      tags: [Playbooks]
      summary: Criar playbook
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'

  /twins/{twin}/playbooks/resync:
    post:
      tags: [Playbooks]
      summary: Sincronizar playbooks com motor de IA
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          description: Sincronizado

  /twins/{twin}/playbooks/{playbook}:
    parameters:
      - $ref: '#/components/parameters/XTenant'
      - $ref: '#/components/parameters/TwinId'
      - name: playbook
        in: path
        required: true
        schema:
          type: integer
    put:
      tags: [Playbooks]
      summary: Atualizar playbook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybookCreate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'
    delete:
      tags: [Playbooks]
      summary: Excluir playbook
      responses:
        '204':
          description: Excluído

  /twins/{twin}/memory-entities:
    get:
      tags: [Memory]
      summary: Listar entidades de memória
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginado
    post:
      tags: [Memory]
      summary: Criar entidade de memória
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, label]
              properties:
                type:
                  type: string
                  maxLength: 32
                label:
                  type: string
                  maxLength: 255
                content:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Criada

  /twins/{twin}/memory-edges:
    get:
      tags: [Memory]
      summary: Listar relações entre entidades
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      responses:
        '200':
          description: Paginado
    post:
      tags: [Memory]
      summary: Criar relação
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/TwinId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, object_id, relation]
              properties:
                subject_id:
                  type: string
                  format: uuid
                object_id:
                  type: string
                  format: uuid
                relation:
                  type: string
                  maxLength: 64
                context:
                  type: string
      responses:
        '201':
          description: Criada

  /imports:
    post:
      tags: [Imports]
      summary: Enviar arquivo de importação
      description: |
        Upload multipart. **Obrigatório** registrar consentimento LGPD antes (`POST /consent`) e informar `consent_id`.
        Para arquivos ZIP, informe também `channel`.
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [twin_id, source, consent_id, file]
              properties:
                twin_id:
                  type: string
                  format: uuid
                source:
                  type: string
                  enum: [whatsapp, telegram, instagram, facebook, messenger, email, json, csv, zip]
                channel:
                  type: string
                  enum: [whatsapp, telegram, instagram, facebook, messenger]
                  description: Obrigatório para source=zip
                consent_id:
                  type: integer
                  description: ID retornado por POST /consent
                file:
                  type: string
                  format: binary
                  description: Máx. 512000 KB
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportBatch'
        '403':
          $ref: '#/components/responses/ForbiddenPlan'
        '422':
          $ref: '#/components/responses/ValidationError'

  /imports/{import}:
    get:
      tags: [Imports]
      summary: Status da importação
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: import
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportBatch'

  /consent/latest:
    get:
      tags: [Consent]
      summary: Último consentimento do usuário
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: type
          in: query
          schema:
            type: string
            enum: [import, training, fine_tune]
            default: import
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentRecord'
        '204':
          description: Nenhum consentimento registrado

  /consent:
    post:
      tags: [Consent]
      summary: Registrar consentimento LGPD
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentRecord'

  /suggest:
    post:
      tags: [AI]
      summary: Gerar sugestão RAG
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestResponse'
        '403':
          $ref: '#/components/responses/ForbiddenPlan'
        '422':
          $ref: '#/components/responses/ValidationError'

  /suggestions:
    get:
      tags: [Suggestions]
      summary: Listar sugestões (inbox)
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: twin_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected, sent]
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginado

  /suggestions/metrics:
    get:
      tags: [Suggestions]
      summary: Métricas de sugestões
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: twin_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionMetrics'

  /suggestions/{suggestion}:
    patch:
      tags: [Suggestions]
      summary: Feedback (aceitar/rejeitar)
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/SuggestionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [accepted, rejected]
                edited_text:
                  type: string
                  maxLength: 10000
      responses:
        '200':
          description: Sugestão atualizada

  /suggestions/{suggestion}/explain:
    get:
      tags: [Suggestions]
      summary: Explicar sugestão
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/SuggestionId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionExplain'

  /suggestions/{suggestion}/send:
    post:
      tags: [Suggestions]
      summary: Enviar sugestão via canal
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/SuggestionId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  maxLength: 10000
      responses:
        '200':
          description: Enviada
        '422':
          description: Já enviada

  /channel-credentials:
    get:
      tags: [Channels]
      summary: Listar credenciais de canal
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelCredential'
    post:
      tags: [Channels]
      summary: Criar credencial de canal
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelCredentialCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelCredential'

  /channel-credentials/{channelCredential}:
    parameters:
      - $ref: '#/components/parameters/XTenant'
      - name: channelCredential
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Channels]
      summary: Atualizar credencial
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                credentials:
                  type: object
                is_active:
                  type: boolean
                reply_mode:
                  type: string
                  enum: [assistant, copilot, approval, auto]
                confidence_threshold:
                  type: number
                  minimum: 0
                  maximum: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelCredential'
    delete:
      tags: [Channels]
      summary: Remover credencial
      responses:
        '204':
          description: Removida

  /channel-metrics:
    get:
      tags: [Channels]
      summary: Métricas de canal
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: twin_id
          in: query
