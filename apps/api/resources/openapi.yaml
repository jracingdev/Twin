      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: twin_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginado

  /conversations/{conversation}:
    get:
      tags: [Conversations]
      summary: Detalhe da conversa com mensagens
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: conversation
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversa e até 500 mensagens

  /train/trigger:
    post:
      tags: [Train]
      summary: Disparar job de treino (DNA/reindex)
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [twin_id, type]
              properties:
                twin_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [dna_extract, reindex, incremental]
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJob'

  /train/jobs/{job}:
    get:
      tags: [Train]
      summary: Status do job de treino
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: job
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJob'

  /timeline:
    get:
      tags: [Timeline]
      summary: Linha do tempo de eventos
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: twin_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        title:
                          type: string
                        type:
                          type: string
                        meta:
                          type: object

  /api-keys:
    get:
      tags: [API Keys]
      summary: Listar chaves de API
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKey'
    post:
      tags: [API Keys]
      summary: Criar chave de API
      parameters:
        - $ref: '#/components/parameters/XTenant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 255
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  key:
                    type: string
                  prefix:
                    type: string

  /api-keys/{apiKey}:
    delete:
      tags: [API Keys]
      summary: Revogar chave
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: apiKey
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Revogada

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Token obtido via POST /login
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Chave de API da organização (alternativa ao Bearer nas rotas de tenant)

  parameters:
    XTenant:
      name: X-Tenant
      in: header
      required: true
      description: UUID da organização (tenant). Obrigatório em rotas de tenant.
      schema:
        type: string
        format: uuid
    TwinId:
      name: twin
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SuggestionId:
      name: suggestion
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Token ausente ou inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Unauthenticated.
    Forbidden:
      description: Sem permissão para o recurso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenPlan:
      description: Limite do plano ou recurso não disponível no plano
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlanError'
          examples:
            twins_limit:
              value:
                message: Limite de twins do plano atingido. Faça upgrade para criar mais.
                code: plan_twins_limit
            seller_mode:
              value:
                message: Modo vendedor disponível apenas nos planos Pro e Business.
                code: plan_seller_mode
            messages_limit:
              value:
                message: Limite mensal de mensagens atingido para o seu plano.
                code: plan_messages_limit
    ValidationError:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string

    PlanError:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          enum:
            - plan_twins_limit
            - plan_seller_mode
            - plan_messages_limit

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        two_factor_code:
          type: string
          description: Obrigatório se 2FA estiver ativo

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
          nullable: true
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'

    TwoFactorRequired:
      type: object
      properties:
        two_factor_required:
          type: boolean
          const: true
        message:
          type: string

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation, organization_name]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        organization_name:
          type: string
          maxLength: 255

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'
          nullable: true
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
        two_factor_enabled:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        role:
          type: string

    Twin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        intensity:
          type: integer
          minimum: 1
          maximum: 4
        seller_mode:
          type: boolean
        vertical:
          type: string
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TwinDetail:
      allOf:
        - $ref: '#/components/schemas/Twin'
        - type: object
          properties:
            active_dna:
              type: object
              nullable: true
              properties:
                version:
                  type: string
                payload:
                  type: object

    TwinCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        intensity:
          type: integer
          minimum: 1
          maximum: 4
          default: 2
        seller_mode:
          type: boolean
          default: false
        vertical:
          type: string
          maxLength: 64

    TwinUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        intensity:
          type: integer
          minimum: 1
          maximum: 4
        seller_mode:
          type: boolean
        vertical:
          type: string
        status:
          type: string
          maxLength: 32

    PaginatedTwins:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Twin'
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    TwinStats:
      type: object
      properties:
        twin_id:
          type: string
          format: uuid
        name:
          type: string
        dna_version:
          type: string
        similarity_score:
          type: number
          nullable: true
        messages_indexed:
          type: integer
        radar:
          type: array
          items:
            type: object
            properties:
              trait:
                type: string
              value:
                type: number
        suggestions:
          type: object
          properties:
            total:
              type: integer
            accepted:
              type: integer
            accept_rate:
              type: number
              nullable: true

    ImportBatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        twin_id:
          type: string
          format: uuid
        consent_id:
          type: integer
        source:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]
        total_messages:
          type: integer
        processed_messages:
          type: integer
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time

    ConsentCreate:
      type: object
      required: [type, text_version]
      properties:
        type:
          type: string
          enum: [import, training, fine_tune]
        text_version:
          type: string
          maxLength: 64
          description: Versão do texto de consentimento exibido ao usuário

    ConsentRecord:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: string
          format: uuid
        user_id:
          type: integer
        type:
          type: string
        text_version:
          type: string
        accepted_at:
          type: string
          format: date-time

    SuggestRequest:
      type: object
      required: [twin_id, text]
      properties:
        twin_id:
          type: string
          format: uuid
        text:
          type: string
          maxLength: 10000
        contact_id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        intensity:
          type: integer
          minimum: 1
          maximum: 4
        seller_mode:
          type: boolean
        confidence_threshold:
          type: number
          minimum: 0
          maximum: 1

    SuggestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        suggested_text:
          type: string
        suggestion:
          type: string
        score:
          type: number
          nullable: true
        confidence:
          type: number
          nullable: true
        auto_send_recommended:
          type: boolean
          nullable: true
        score_breakdown:
          type: object
          nullable: true
        intensity:
          type: integer
        seller_mode:
          type: boolean
        status:
          type: string
        metadata:
          type: object

    SuggestionMetrics:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        accepted:
          type: integer
        sent:
          type: integer
        rejected:
          type: integer
        accept_rate:
          type: number
          nullable: true

    SuggestionExplain:
      type: object
      properties:
        id:
          type: string
          format: uuid
        score:
          type: number
          nullable: true
        factors:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              label:
                type: string
              value:
                type: number
              explanation:
                type: string
        summary:
          type: string

    ChannelCredential:
      type: object
      properties:
        id:
          type: string
          format: uuid
        twin_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [whatsapp, telegram, slack, discord]
        is_active:
          type: boolean
        reply_mode:
          type: string
          enum: [assistant, copilot, approval, auto]
        confidence_threshold:
          type: number
        webhook_token:
          type: string
          description: Token mascarado
        webhook_url:
          type: string
          format: uri
          description: URL de ingress para a plataforma configurar
        created_at:
          type: string
          format: date-time

    ChannelCredentialCreate:
      type: object
      required: [twin_id, channel, credentials]
      properties:
        twin_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [whatsapp, telegram, slack, discord]
        credentials:
          type: object
          description: |
            Campos obrigatórios por canal:
            - whatsapp: phone_number_id, access_token, verify_token, app_secret
            - telegram: bot_token
            - slack: bot_token, signing_secret
            - discord: bot_token, public_key
        reply_mode:
          type: string
          enum: [assistant, copilot, approval, auto]
        confidence_threshold:
          type: number
          minimum: 0
          maximum: 1

    ChannelMetrics:
      type: object
      properties:
        twin_id:
          type: string
          format: uuid
          nullable: true
        pending:
          type: integer
        sent_today:
          type: integer
        avg_response_time_seconds:
          type: integer
          nullable: true
        accept_rate_7d:
          type: number
          nullable: true

    PlanSummary:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        seller_mode:
          type: boolean
        twins_limit:
          type: integer
        messages_per_month:
          type: integer

    Plan:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        price_monthly:
          type: number
        twins_limit:
          type: integer
        seller_mode:
          type: boolean

    WebhookSettings:
      type: object
      properties:
        webhook_url:
          type: string
          format: uri
          nullable: true
        webhook_events:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        channel:
          type: string
        external_id:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        preferred_tone:
          type: string
          nullable: true

    ContactCreate:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          maxLength: 255
        channel:
          type: string
          maxLength: 32
        external_id:
          type: string
        tags:
          type: array
          items:
            type: string
        preferred_tone:
          type: string

    Playbook:
      type: object
      properties:
        id:
          type: integer
        twin_id:
          type: string
          format: uuid
        intent:
          type: string
        vertical:
          type: string
        template:
          type: string
        usage_count:
          type: integer

    PlaybookCreate:
      type: object
      required: [intent, template]
      properties:
        intent:
          type: string
          maxLength: 32
        vertical:
          type: string
          maxLength: 64
        template:
          type: string
        variables:
          type: object

    TrainingJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        twin_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [dna_extract, reindex, incremental]
        status:
          type: string
          enum: [queued, processing, completed, failed]
        result:
          type: object
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    ApiKey:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
