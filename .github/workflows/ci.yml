name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Path filters
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/ci.yml'

  api-smoke:
    name: API PHPUnit smoke
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_sqlite, sqlite3, tokenizer, xml, ctype, json, bcmath, fileinfo
          coverage: none
      - name: Composer install
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPUnit Feature smoke
        run: vendor/bin/phpunit --testsuite Feature
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  web-build:
    name: Web build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8080/api/v1
          NEXT_PUBLIC_AI_ENGINE_URL: http://127.0.0.1:8000
